inherits: phase5_base.yaml

phase2_training:
  mode: smoke

phase5_evaluation:
  mode: smoke
  checkpoint_path: logs/checkpoints/smoke_phase3_best.pt

smoke:
  phase5_evaluation:
    methods:
      nmse: [conventional, baseline, refined, blended, perfect]
      ber: [conventional, baseline, refined, blended, perfect]
    nmse_vs_pdr:
      enabled: true
      modulation: bpsk
      data_snr_db: 15.0
      pdr_db: [0.0, 20.0]
      realizations: 2
    nmse_vs_snr:
      enabled: true
      modulation: bpsk
      data_snr_db: [10.0, 15.0]
      pdr_db: 5.0
      realizations: 2
    ber_vs_pdr:
      enabled: true
      modulation: bpsk
      data_snr_db: 18.0
      pdr_db: [0.0, 20.0]
      target_bit_errors: 1
      max_bits: 4096
      min_frames: 1
      solver: dense
    ber_vs_snr:
      enabled: true
      modulation: [bpsk]
      data_snr_db: [10.0, 15.0]
      pdr_db: 5.0
      target_bit_errors: 1
      max_bits: 4096
      min_frames: 1
      solver: dense
