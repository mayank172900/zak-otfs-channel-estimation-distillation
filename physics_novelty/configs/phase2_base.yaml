inherits: phase1_base.yaml

phase2_model:
  in_channels: 6
  hidden_channels: 32
  num_blocks: 3
  kernel_size: 3

phase2_dataset:
  train_manifest_path: results/phase1_datasets/train_phase1.json
  val_manifest_path: results/phase1_datasets/val_phase1.json
  num_workers: 0

phase2_training:
  mode: full
  batch_size: 64
  epochs: 10
  learning_rate: 0.001
  checkpoint_name: phase2_best.pt
  auto_resume: true
  save_epoch_checkpoints: true
  early_stop_patience: 3
  lambda_unc: 0.1
  lambda_delta: 0.05
  lambda_phys: 0.0
  beta: 0.01
  enable_physics_loss: false
  scheduler:
    factor: 0.8
    patience: 1
    min_lr: 1.0e-06

smoke:
  phase2_dataset:
    train_manifest_path: results/phase1_datasets/smoke_phase1.json
    val_manifest_path: results/phase1_datasets/smoke_phase1.json
  phase2_training:
    mode: smoke
    batch_size: 2
    epochs: 1
    auto_resume: false
    save_epoch_checkpoints: false
    early_stop_patience: 1
