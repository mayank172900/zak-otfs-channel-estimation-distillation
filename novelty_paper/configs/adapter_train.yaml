inherits: system.yaml

adapter_dataset:
  train_size_total: 48000
  val_size_total: 12000
  training_snr_db: 15.0
  training_pdr_db: [0.0, 5.0, 20.0, 25.0, 30.0, 35.0]
  modulation: bpsk
  num_workers: 0
  baseline_manifest_paths:
    train: ../results/datasets/train_full.json
    val: ../results/datasets/val_full.json

adapter_training:
  batch_size: 128
  epochs: 8
  learning_rate: 0.001
  residual_penalty: 0.001
  auto_resume: true
  save_epoch_checkpoints: true
  early_stop_patience: 3
  scheduler:
    factor: 0.8
    patience: 1
    min_lr: 1.0e-06

smoke:
  adapter_dataset:
    train_size_total: 120
    val_size_total: 24
  adapter_training:
    batch_size: 16
    epochs: 1
    early_stop_patience: 1
