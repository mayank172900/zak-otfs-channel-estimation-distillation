inherits: system.yaml

evaluation:
  nmse_vs_pdr:
    modulation: bpsk
    data_snr_db: 15.0
    pdr_db: [-5.0, 0.0, 5.0, 10.0, 15.0, 20.0, 25.0]
    realizations: 400
    methods: [conventional, cnn, generic, fb_lara]
  nmse_vs_snr:
    modulation: bpsk
    pdr_db: 5.0
    data_snr_db: [0.0, 3.0, 6.0, 9.0, 12.0, 15.0, 18.0, 21.0, 24.0]
    realizations: 400
    methods: [conventional, cnn, generic, fb_lara]
  ber_vs_pdr:
    modulation: bpsk
    data_snr_db: 18.0
    pdr_db: [-5.0, 0.0, 5.0, 10.0, 15.0, 20.0, 25.0]
    target_bit_errors: 200
    max_bits: 1000000
    min_frames: 20
    solver: dense_torch
    methods: [conventional, cnn, generic, fb_lara, perfect]
  ber_vs_snr:
    pdr_db: 5.0
    data_snr_db: [0.0, 3.0, 6.0, 9.0, 12.0, 15.0, 18.0, 21.0, 24.0]
    modulation: [bpsk, 8qam_cross]
    target_bit_errors: 200
    max_bits: 1000000
    min_frames: 20
    solver: dense_torch
    methods: [conventional, cnn, generic, fb_lara, perfect]

smoke:
  evaluation:
    nmse_vs_pdr:
      realizations: 2
    nmse_vs_snr:
      realizations: 2
    ber_vs_pdr:
      target_bit_errors: 5
      max_bits: 5000
      min_frames: 2
    ber_vs_snr:
      target_bit_errors: 5
      max_bits: 5000
      min_frames: 2
